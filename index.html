    <script>
      (function () {
        var viewport = document.querySelector('meta[name="viewport"]');
        if (!viewport) return;
        var defaultViewport = 'width=device-width, initial-scale=1.0, viewport-fit=cover';
        var isMobile = function () {
          return (window.matchMedia && window.matchMedia('(max-width: 900px)').matches) || /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent) || (navigator.maxTouchPoints > 1 && (screen.width || innerWidth) <= 1024);
        };
        var mobileViewport = function () {
          return 'width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover';
        };
        var applyViewport = function () {
          viewport.setAttribute('content', isMobile() ? mobileViewport() : defaultViewport);
          if (isMobile()) {
            document.documentElement.style.width = '100%';
            document.documentElement.style.minWidth = '0';
            if (document.body) {
              document.body.style.width = '100%';
              document.body.style.minWidth = '0';
              document.body.style.overflowX = 'hidden';
            }
            requestAnimationFrame(function () { viewport.setAttribute('content', mobileViewport()); });
          }
        };
        applyViewport();
        window.addEventListener('pageshow', applyViewport, { passive: true });
        window.addEventListener('focus', applyViewport, { passive: true });
        window.addEventListener('resize', applyViewport, { passive: true });
        window.addEventListener('orientationchange', applyViewport, { passive: true });
        document.addEventListener('visibilitychange', function () {
          if (document.visibilityState === 'visible') applyViewport();
        });
      })();
    </script>
